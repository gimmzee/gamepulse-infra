apiVersion: apps/v1
kind: Deployment
metadata:
  name: gamepulse-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gamepulse-frontend
  template:
    metadata:
      labels:
        app: gamepulse-frontend
    spec:
      containers:
        - name: gamepulse-frontend
          image: ghcr.io/gimmzee/gamepulse-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: gamepulse-frontend-service
  labels:
    app: gamepulse-frontend
spec:
  selector:
    app: gamepulse-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP