apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gamepulse-app-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: gamepulse.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gamepulse-app-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gamepulse-frontend-service
                port:
                  number: 80
      # 외부 도메인 추가
    - host: gamepulse.vbnmzxc.shop
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gamepulse-app-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gamepulse-frontend-service
                port:
                  number: 80